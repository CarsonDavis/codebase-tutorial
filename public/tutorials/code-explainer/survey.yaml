slug: code-explainer
name: Code Explainer
source:
  path: /Users/cdavis/github/code-explainer
  url: https://github.com/CarsonDavis/code-explainer

notes: |
  Code Explainer is a side-by-side viewer for code reviews. An external coding agent reads
  a repo + a git diff and writes a `review.json`; this app renders that JSON as a
  three-column UI (file tree | diff | explanation cards anchored to line ranges).

  Stack: Next.js 15 App Router, React 19, TypeScript, Tailwind CSS v4, Shiki for syntax
  highlighting (the same VS Code grammars + Dark+ theme), the `diff` library for
  line-level diffing. Reviews live as JSON under `public/reviews/`; the home page lists
  them and `/reviews/[slug]` renders a chosen review via SSG.

  Two halves of the project: an agent (defined in `AGENTS.md` at the repo root) that
  produces `review.json`, and the web app that renders it. The README is explicit that
  the agent is the "smart part" and the viewer "just shows what the agent wrote." The
  intended usage is local-first; the AWS CDK + GitHub Actions deploy pieces are an
  example, not the main path.

components:
  - id: viewer
    title: Viewer
    summary: |
      The Next.js app that renders a review as a three-column UI. Built around the
      review.json schema: a file tree on the left, the full diff in the middle, and
      explanation cards anchored to line ranges on the right.
    type: subdivided
    focus_paths:
      - app
      - lib
    sub_sections:
      - id: routing-and-shell
        title: Routing and shell
        summary: |
          How the app is structured at the top level — the home page that lists reviews,
          the per-review page, and the three-column layout shell with the file tree.
        focus_paths:
          - app/page.tsx
          - app/layout.tsx
          - app/reviews/[slug]/page.tsx
          - app/components/ReviewLayout.tsx
          - app/components/FileTree.tsx
          - lib/reviews.ts
          - lib/fileTree.ts

      - id: diff-rendering
        title: Diff rendering
        summary: |
          How the side-by-side diff is computed and rendered, including the intra-line
          word-level highlighting and the truncation/elision strategy for unchanged
          context.
        focus_paths:
          - app/components/DiffViewer.tsx
          - lib/diff.ts
          - lib/diffTruncate.ts

      - id: explanation-cards
        title: Explanation cards
        summary: |
          How per-file overviews and per-change explanation cards are composed and
          anchored to specific line ranges in the diff. This is the core viewing
          experience.
        focus_paths:
          - app/components/FileSection.tsx
          - app/components/FileOverview.tsx
          - app/components/ExplanationCard.tsx
          - lib/types.ts

      - id: highlighting-and-settings
        title: Syntax highlighting and settings
        summary: |
          Shiki integration (lazy grammar loading, tokenization), the customizable
          color palette, the settings menu, and the optional tour.
        focus_paths:
          - lib/highlighter.ts
          - lib/highlightPalette.ts
          - lib/highlightSettings.ts
          - app/components/SettingsMenu.tsx
          - lib/tour.ts

  - id: agent-contract
    title: Agent contract
    summary: |
      The canonical contract for the coding agent that produces review.json. Defines the
      workflow (fetch diff, build mental model, write per-change explanations), the JSON
      schema, and the tone/depth rules that keep explanations useful instead of bloated.
      This is the "smart half" of the project — without good agent output, the viewer
      has nothing to show.
    type: atomic
    focus_paths:
      - AGENTS.md
      - examples
      - lib/types.ts

  - id: infrastructure
    title: Infrastructure
    summary: |
      Optional AWS deployment using Python CDK v2. Provisions a static-hosting stack
      (S3 + CloudFront) for the exported Next.js site. Local-first usage does not need
      this — it is example deploy code.
    type: atomic
    focus_paths:
      - cdk/app.py
      - cdk/stacks/code_explainer_stack.py
      - cdk/cdk.json
      - cdk/requirements.txt

  - id: ci-cd
    title: CI/CD
    summary: |
      GitHub Actions workflow that builds the Next.js static export and deploys it via
      the CDK stack. Triggered on pushes to main; complements the local-first usage by
      keeping the public demo site fresh.
    type: atomic
    focus_paths:
      - .github/workflows/deploy.yml
